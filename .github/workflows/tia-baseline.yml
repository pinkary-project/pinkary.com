name: TIA Baseline

permissions:
  contents: read

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: tia-baseline
  cancel-in-progress: true

jobs:
  baseline:
    runs-on: ubuntu-latest

    name: TIA Baseline

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: dependencies-php-composer-${{ hashFiles('composer.lock') }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: json, dom, curl, libxml, mbstring, zip, imagick, intl, bcmath, pdo, pdo_sqlite, sqlite3
          tools: composer:v2
          coverage: xdebug

      - name: Set up Node & NPM
        uses: actions/setup-node@v2
        with:
          node-version: '22.x'

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --ansi

      - name: Get NPM cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}

      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install NPM dependencies
        run: npm install

      - name: Build front-end assets
        # Vite manifest is read during Laravel boot (Filament + Livewire).
        # Without it, every test that renders a view blows up long before
        # TIA gets to record anything.
        run: npm run build

      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Record TIA baseline
        run: ./vendor/bin/pest --parallel --tia --coverage

      - name: Resolve TIA baseline path
        id: baseline
        run: echo "path=$(vendor/bin/pest --baseline)" >> "$GITHUB_OUTPUT"

      - name: Upload TIA baseline
        uses: actions/upload-artifact@v4
        with:
          name: pest-tia-baseline
          path: ${{ steps.baseline.outputs.path }}
          include-hidden-files: true
          retention-days: 30
